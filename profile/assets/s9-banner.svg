<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 440" width="1280" height="440" role="img" aria-label="SHIFT-9 — Design and Engineering Studio">
  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e2e8f0"/>
      <stop offset="1" stop-color="#a9b6c9"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#22d3ee" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
    <style>
      @keyframes eq { 0%{transform:scaleY(0.25)} 100%{transform:scaleY(1)} }
      @keyframes scan { 0%{transform:translateX(-260px)} 100%{transform:translateX(1280px)} }
      @keyframes flick { 0%,100%{opacity:0.5} 50%{opacity:1} }
      .bar{transform-box:fill-box;transform-origin:bottom center;animation:eq 1.6s ease-in-out infinite alternate}
      .scan{animation:scan 5.5s linear infinite}
      .flick{animation:flick 2.4s ease-in-out infinite}
      @media (prefers-reduced-motion: reduce){
        .bar,.scan,.flick{animation:none}
        .bar{transform:scaleY(0.7)}
      }
    </style>
  </defs>

  <!-- field -->
  <rect width="1280" height="440" fill="#0f172a"/>
  <rect width="1280" height="440" fill="url(#grid)"/>
  <rect width="1280" height="440" fill="none" stroke="#22d3ee" stroke-opacity="0.16" stroke-width="1" x="0" y="0"/>
  <rect x="22" y="22" width="1236" height="396" fill="none" stroke="#22d3ee" stroke-opacity="0.18" stroke-width="1"/>

  <!-- corner registration marks -->
  <g stroke="#22d3ee" stroke-width="2" fill="none">
    <path d="M22 44V22H44"/>
    <path d="M1236 22H1258V44"/>
    <path d="M22 396V418H44"/>
    <path d="M1258 396V418H1236"/>
  </g>

  <!-- mono axis labels -->
  <text x="52" y="40" fill="#64748b" font-family="'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace" font-size="13" letter-spacing="5">SHIFT-9 // INSTRUMENT</text>
  <text x="1228" y="408" fill="#64748b" font-family="'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace" font-size="13" letter-spacing="5" text-anchor="end">X:001 · Y:STUDIO</text>

  <!-- wordmark (condensed via horizontal compression for cross-platform consistency) -->
  <g transform="translate(64 252) scale(0.86 1)">
    <text x="0" y="0" font-family="'Arial Narrow','Roboto Condensed','Helvetica Neue',sans-serif" font-weight="800" font-size="188" letter-spacing="-2" fill="url(#ink)">SHIFT<tspan fill="#22d3ee">-9</tspan></text>
  </g>

  <!-- subtitle -->
  <text x="68" y="312" fill="#94a3b8" font-family="'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace" font-size="20" letter-spacing="7">DESIGN <tspan fill="#8b5cf6">+</tspan> ENGINEERING STUDIO</text>
  <text x="68" y="344" fill="#64748b" font-family="'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace" font-size="14" letter-spacing="4" class="flick">// code execution in motion — we design &amp; ship.</text>

  <!-- INSTRUMENT equalizer bars -->
  <g transform="translate(980 300)">
    <rect class="bar" x="0"   y="-120" width="14" height="120" fill="#22d3ee" style="animation-delay:0s"/>
    <rect class="bar" x="26"  y="-120" width="14" height="120" fill="#22d3ee" style="animation-delay:-0.3s"/>
    <rect class="bar" x="52"  y="-120" width="14" height="120" fill="#8b5cf6" style="animation-delay:-0.6s"/>
    <rect class="bar" x="78"  y="-120" width="14" height="120" fill="#22d3ee" style="animation-delay:-0.15s"/>
    <rect class="bar" x="104" y="-120" width="14" height="120" fill="#8b5cf6" style="animation-delay:-0.9s"/>
    <rect class="bar" x="130" y="-120" width="14" height="120" fill="#22d3ee" style="animation-delay:-0.45s"/>
    <rect class="bar" x="156" y="-120" width="14" height="120" fill="#8b5cf6" style="animation-delay:-0.75s"/>
    <rect class="bar" x="182" y="-120" width="14" height="120" fill="#22d3ee" style="animation-delay:-1.05s"/>
  </g>

  <!-- scanning hairline -->
  <rect class="scan" x="0" y="22" width="260" height="396" fill="url(#sweep)" opacity="0.5"/>
</svg>
