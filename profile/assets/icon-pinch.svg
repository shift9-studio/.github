<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 112 112" width="96" height="96" role="img" aria-label="Just a Pinch app icon">
  <defs>
    <clipPath id="clip"><rect x="8" y="8" width="96" height="96" rx="20"/></clipPath>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
      @keyframes pulse { 0%,100%{opacity:.22} 50%{opacity:.6} }
      .ic   { animation: float 4.4s ease-in-out infinite; }
      .halo { animation: pulse 3.6s ease-in-out infinite; }
      @media (prefers-reduced-motion: reduce) {
        .ic, .halo { animation: none; }
        .halo { opacity:.35; }
      }
    </style>
  </defs>
  <g class="ic">
    <rect class="halo" x="8" y="8" width="96" height="96" rx="20" fill="#f5a524" filter="url(#glow)" opacity=".3"/>
    <image x="8" y="8" width="96" height="96" clip-path="url(#clip)"
      href="data:image/png;base64,"/>
    <rect x="8" y="8" width="96" height="96" rx="20" fill="none" stroke="#f5a524" stroke-opacity=".55" stroke-width="1.5"/>
  </g>
</svg>
