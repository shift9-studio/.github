<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 163" width="100%" role="img">
  <defs>
    <linearGradient id="ray" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#22d3ee" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#22d3ee" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <clipPath id="bounds"><rect width="1000" height="163"/></clipPath>
    <style>
      @keyframes drift { from{transform:translateX(-40%)} to{transform:translateX(140%)} }
      @keyframes glow  { 0%,100%{opacity:.35} 50%{opacity:.7} }
      .scan { animation: drift 7s linear infinite; }
      .tick { animation: glow 3.4s ease-in-out infinite; }
      @media (prefers-reduced-motion: reduce){ .scan{animation:none;opacity:.3} .tick{animation:none} }
    </style>
  </defs>
  <g clip-path="url(#bounds)">
    <rect width="1000" height="163" fill="#0a0e1a"/>
    <rect width="1000" height="163" fill="url(#grid)"/>
    <line x1="-100" y1="33" x2="500" y2="203" stroke="#22d3ee" stroke-opacity="0.10" stroke-width="1.5"/>
    <line x1="550" y1="-40" x2="1100" y2="114" stroke="#22d3ee" stroke-opacity="0.08" stroke-width="1.5"/>
    <rect class="scan" x="0" y="0" width="180" height="163" fill="url(#ray)" opacity="0.5"/>
    <rect x="0" y="0" width="1000" height="163" fill="none" stroke="#22d3ee" stroke-opacity="0.16"/>
    <g stroke="#22d3ee" stroke-width="1.5" fill="none" class="tick">
      <path d="M14 28V14H28"/><path d="M972 14H986V28"/>
      <path d="M14 135V149H28"/><path d="M986 135V149H972"/>
    </g>
    <text x="22" y="26" fill="#9aa7b8" font-family="'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace" font-size="12" letter-spacing="3">Y:SHIFT9.DEV</text>
  </g>
    <text x="40" y="64" fill="#22d3ee" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-size="30" font-weight="800" letter-spacing="0.5" text-anchor="start">shift9.dev</text>
    <text x="40" y="104" fill="#9aa7b8" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-size="19" font-weight="400" letter-spacing="0" text-anchor="start">Our studio site — the work we've done, what we do, and how to start a project.</text>
    <text x="40" y="132" fill="#9aa7b8" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-size="19" font-weight="400" letter-spacing="0" text-anchor="start">It's also a live example of the kind of sites we build.</text>
</svg>
