<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 222" width="100%" role="img">
  <defs>
    <linearGradient id="ray" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#22d3ee" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#22d3ee" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <clipPath id="bounds"><rect width="1200" height="222"/></clipPath>
    <style>
      @keyframes drift { from{transform:translateX(-40%)} to{transform:translateX(140%)} }
      @keyframes glow  { 0%,100%{opacity:.35} 50%{opacity:.7} }
      .scan { animation: drift 7s linear infinite; }
      .tick { animation: glow 3.4s ease-in-out infinite; }
      @media (prefers-reduced-motion: reduce){ .scan{animation:none;opacity:.3} .tick{animation:none} }
    </style>
  </defs>
  <g clip-path="url(#bounds)">
    <rect width="1200" height="222" fill="#0a0e1a"/>
    <rect width="1200" height="222" fill="url(#grid)"/>
    <line x1="-100" y1="44" x2="600" y2="262" stroke="#22d3ee" stroke-opacity="0.10" stroke-width="1.5"/>
    <line x1="660" y1="-40" x2="1300" y2="155" stroke="#22d3ee" stroke-opacity="0.08" stroke-width="1.5"/>
    <rect class="scan" x="0" y="0" width="180" height="222" fill="url(#ray)" opacity="0.5"/>
    <rect x="0" y="0" width="1200" height="222" fill="none" stroke="#22d3ee" stroke-opacity="0.16"/>
    <g stroke="#22d3ee" stroke-width="1.5" fill="none" class="tick">
      <path d="M14 28V14H28"/><path d="M1172 14H1186V28"/>
      <path d="M14 194V208H28"/><path d="M1186 194V208H1172"/>
    </g>
    <text x="22" y="26" fill="#9aa7b8" font-family="'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace" font-size="12" letter-spacing="3">X:004 · Y:SHIPPING</text>
  </g>
