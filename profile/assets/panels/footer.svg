<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 70" width="100%" role="img">
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#22d3ee" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <style>
      @keyframes rail { 0%,100%{opacity:.4} 50%{opacity:.85} }
      .rail { animation: rail 4.2s ease-in-out infinite; }
      @media (prefers-reduced-motion: reduce){ .rail{animation:none;opacity:.6} }
    </style>
  </defs>
  <rect width="1200" height="70" fill="#0a0e1a"/>
  <rect width="1200" height="70" fill="url(#grid)"/>
  <rect class="rail" x="0" y="0" width="4" height="70" fill="#22d3ee"/>
  <rect x="4" y="0" width="1" height="70" fill="#22d3ee" opacity="0.15"/>

    <text x="600" y="42" fill="#9aa7b8" font-family="'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace" font-size="15" font-weight="400" letter-spacing="2" text-anchor="middle">// build: stable — © 2026 SHIFT-9, made in motion</text>
</svg>
