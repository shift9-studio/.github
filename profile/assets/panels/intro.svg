<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 248" width="100%" role="img">
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#22d3ee" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <style>
      @keyframes rail { 0%,100%{opacity:.4} 50%{opacity:.85} }
      .rail { animation: rail 4.2s ease-in-out infinite; }
      @media (prefers-reduced-motion: reduce){ .rail{animation:none;opacity:.6} }
    </style>
  </defs>
  <rect width="1200" height="248" fill="#0a0e1a"/>
  <rect width="1200" height="248" fill="url(#grid)"/>
  <rect class="rail" x="0" y="0" width="4" height="248" fill="#22d3ee"/>
  <rect x="4" y="0" width="1" height="248" fill="#22d3ee" opacity="0.15"/>
    <text x="1182" y="24" fill="#9aa7b8" font-family="'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace" font-size="11" letter-spacing="3" text-anchor="end" opacity="0.55">X:001 · Y:STUDIO</text>
    <text x="60" y="78" fill="#22d3ee" font-family="'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace" font-size="17" font-weight="700" letter-spacing="4" text-anchor="start">// SHIFT-9 — DESIGN + ENGINEERING STUDIO</text>
    <text x="58" y="160" fill="#e6edf3" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-size="66" font-weight="900" letter-spacing="1" text-anchor="start">WE DESIGN <tspan fill="#22d3ee">&amp; SHIP.</tspan></text>
    <text x="60" y="206" fill="#9aa7b8" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-size="21" font-weight="400" letter-spacing="0" text-anchor="start">A design and engineering studio. We build brands, websites, and apps —</text>
    <text x="60" y="234" fill="#9aa7b8" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-size="21" font-weight="400" letter-spacing="0" text-anchor="start">and the systems that keep them running.</text>
</svg>
